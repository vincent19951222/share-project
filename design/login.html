<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Todo - 登录</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts: Quicksand & Noto Sans SC -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .soft-card {
            background-color: #ffffff;
            border: 6px solid #f1f5f9;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* 粗野风按钮 */
        .quest-btn {
            background-color: #fde047;
            border: 3px solid #1f2937;
            border-radius: 9999px;
            box-shadow: 0 4px 0 0 #1f2937;
            color: #1f2937;
            font-weight: 800;
            transition: all 0.1s ease-in-out;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .quest-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 #1f2937;
        }

        /* 粗野风输入框 */
        .brutal-input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            padding-left: 3rem; /* 给图标留空间 */
            border: 3px solid #e2e8f0;
            border-radius: 1rem;
            outline: none;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-weight: 700;
            color: #1e293b;
            background-color: #f8fafc;
        }
        .brutal-input::placeholder {
            color: #94a3b8;
            font-weight: 500;
        }
        .brutal-input:focus {
            background-color: #ffffff;
            border-color: #1f2937;
            box-shadow: 0 4px 0 0 #1f2937;
            transform: translateY(-2px);
        }
        
        /* 输入框容器相对定位，用于放置 SVG 图标 */
        .input-group {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.25rem;
            height: 1.25rem;
            color: #64748b;
            transition: color 0.2s;
            pointer-events: none;
        }
        .brutal-input:focus ~ .input-icon {
            color: #1f2937;
        }

        .text-sub { color: #64748b; }
        .text-main { color: #1e293b; }
        
        .poster-bg {
            background-image: url('login-poster.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="min-h-screen w-screen flex items-center justify-center p-4 md:p-8 text-main relative">

    <!-- 主容器：左右双栏 -->
    <main class="w-full max-w-5xl h-[80vh] min-h-[600px] soft-card flex flex-col md:flex-row overflow-hidden relative z-10 bg-white">
        
        <!-- ================= 左侧：品牌海报区 (Poster) ================= -->
        <div class="hidden md:flex w-1/2 relative poster-bg border-r-4 border-slate-100 overflow-hidden group">

            <!-- 半透明遮罩，让海报背景更柔和、文字更清晰 -->
            <div class="absolute inset-0 bg-gradient-to-b from-slate-900/50 via-slate-900/10 to-slate-900/70"></div>

            <!-- Logo 与 Slogan 层 -->
            <div class="absolute inset-0 p-10 flex flex-col justify-between text-white z-10">
                <!-- 顶部 Logo -->
                <div class="font-black text-3xl tracking-tighter flex items-center gap-2 drop-shadow-md">
                    <div class="w-10 h-10 bg-yellow-300 border-2 border-slate-800 rounded-xl flex items-center justify-center shadow-[0_3px_0_0_#1f2937] p-1.5">
                        <svg viewBox="0 0 24 24" class="w-full h-full text-slate-800" fill="#fcd34d" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M2 8h20M12 8v13M8 13h8"/></svg>
                    </div>
                    ROOM TODO
                </div>

                <!-- 底部 Slogan -->
                <div class="flex flex-col gap-2">
                    <span class="px-3 py-1 bg-yellow-300/90 text-slate-900 text-xs font-bold rounded-md w-max border-2 border-slate-800 shadow-[2px_2px_0px_0px_#1f2937]">LEVEL UP TOGETHER</span>
                    <h1 class="text-4xl font-black leading-tight drop-shadow-lg">
                        打卡不仅仅是<br/>完成任务，<br/>更是团队的荣誉。
                    </h1>
                </div>
            </div>
        </div>

        <!-- ================= 右侧：登录/加入表单区 ================= -->
        <div class="w-full md:w-1/2 p-8 md:p-14 flex flex-col justify-center bg-white">
            
            <div class="mb-10">
                <h2 class="text-3xl font-black mb-2 text-slate-800">Join Room</h2>
                <p class="text-sub font-bold text-sm">输入房间代码与你的代号，准备开始健身挑战。</p>
            </div>

            <form class="flex flex-col gap-6" onsubmit="event.preventDefault(); window.location.href='index.html';">
                
                <!-- 房间号输入 -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-sub tracking-wider uppercase pl-1">Room Access Code</label>
                    <div class="input-group">
                        <input type="text" placeholder="Enter code (e.g. ROOM-88)" class="brutal-input" required />
                        <!-- Key SVG -->
                        <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
                    </div>
                </div>

                <!-- 昵称输入 -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-sub tracking-wider uppercase pl-1">Your Avatar Name</label>
                    <div class="input-group">
                        <input type="text" placeholder="Adventurer name" class="brutal-input" required />
                        <!-- User SVG -->
                        <svg viewBox="0 0 24 24" class="input-icon" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <button type="submit" class="quest-btn w-full py-4 text-lg mt-4 flex gap-2">
                    <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    START QUEST
                </button>

            </form>

            <div class="mt-8 text-center">
                <span class="text-sub text-sm font-bold">还没拥有团队基地？ </span>
                <a href="#" class="text-blue-600 font-black hover:underline decoration-2 underline-offset-4">Create a new room</a>
            </div>

        </div>
    </main>

</body>
</html>
